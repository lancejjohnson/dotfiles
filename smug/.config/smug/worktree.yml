session: ${name}
attach: true # Automatically attach to this session

root: ${dir}

windows:
  - name: mono
    selected: true # Selects this window at the start of the session
    layout: main-vertical
    commands:
      - claude
    panes:
      - type: horizontal

  - name: axon
    root: apps/axon
    commands:
      - rm -rf deps/
      - mix deps.get
      - npm install --prefix assets/

  - name: dendra
    root: apps/dendra
    commands:
      - yarn install
